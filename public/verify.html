<!DOCTYPE html>
<html lang="uk" class="bg-background">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VARTA — Підтвердження email</title>
    <meta name="description" content="Підтвердження email акаунта VARTA." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell" style="max-width:460px;grid-template-columns:1fr">
      <section class="main">
        <div class="brand" style="color:var(--primary);margin-bottom:18px">
          <span class="lock" style="background:#e7eefc">&#128274;</span> VARTA
        </div>
        <h1>Підтвердження email</h1>
        <p class="sub" id="status">Перевіряємо токен…</p>
        <div class="msg" id="msg"></div>
        <a class="btn" href="/" style="text-align:center;text-decoration:none;display:block">До входу</a>
      </section>
    </main>

    <script>
      (async function () {
        const params = new URLSearchParams(location.search);
        const token = params.get("token");
        const status = document.getElementById("status");
        const msg = document.getElementById("msg");

        if (!token) {
          status.textContent = "Відсутній токен підтвердження.";
          return;
        }
        const res = await fetch("/api/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const data = await res.json().catch(() => ({}));
        status.textContent = "";
        if (res.ok) {
          msg.className = "msg show ok";
          msg.textContent = data.message || "Email підтверджено.";
        } else {
          msg.className = "msg show err";
          msg.textContent = data.error || "Помилка підтвердження.";
        }
      })();
    </script>
  </body>
</html>
